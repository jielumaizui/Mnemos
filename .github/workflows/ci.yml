name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: 1

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compile check
        run: |
          python -m compileall core/ integrations/ mnemos_cli.py -q

      - name: Lint with flake8
        run: |
          flake8 core/ integrations/ mnemos_cli.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run smoke tests
        run: |
          python -m pytest tests/ -v --ignore=tests/test_system.py
        if: runner.os != 'Windows'

      - name: Run smoke tests (Windows)
        run: |
          python -m pytest tests/test_smoke.py tests/test_functional.py tests/test_pipeline.py -v
        if: runner.os == 'Windows'

      - name: Test CLI help
        run: |
          python mnemos_cli.py --help
      # Note: `mnemos doctor` skipped in CI because it checks for
      # Claude Code settings.json which doesn't exist in CI environment.
