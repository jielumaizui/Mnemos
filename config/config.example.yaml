# Mnemos 旧版 YAML 配置参考
# 运行时权威配置为 ~/.mnemos/configs/main.json；新安装请优先使用 config.example.json

wiki:
  # Obsidian Vault 中的 wiki 目录路径
  # 留空则自动检测平台默认值
  vault_path: "~/Documents/Obsidian Vault/wiki"

memos:
  enabled: true
  # Memos 服务器地址
  api_url: "https://your-memos-instance.com"
  # API Token（建议通过 MEMOS_TOKEN 环境变量设置）
  token: ""

persona:
  enabled: true
  # 画像数据源开关
  # 开启越多画像越精准，但隐私暴露也越多
  data_sources:
    session:
      enabled: true
      description: "AI对话信号（核心）- 推断专注深度、质疑倾向、完美偏好等"
    git:
      enabled: false
      description: "Git提交记录 - 推断续航模式、创新倾向、协作偏好"
    memos:
      enabled: false
      description: "Memos笔记 - 推断认知风格、知识结构"
    wiki:
      enabled: false
      description: "知识库交互 - 推断关注领域、学习路径"
    file_system:
      enabled: false
      description: "文件系统活动 - 推断工作模式、项目切换频率"
    wechat:
      enabled: false
      description: "微信聊天记录 - 推断情绪模式、社交偏好"

integrations:
  claude_code:
    enabled: true
    settings_json_path: "~/.claude/settings.json"
  mcp:
    enabled: false

distill:
  # 真实环境保护：积压恢复时分批处理，避免 CPU/磁盘/宿主 Agent 持续高负载
  max_tasks_per_cycle: 5
  max_collect_per_cycle: 20
  min_task_interval_seconds: 1.0

daemon:
  services:
    # 默认只消费 MCP/Hook 入队，不主动扫描本机历史聊天文件
    capture_worker: true
    l1_sync: false
    distill_merge: true
    heartbeat: true
    inbox_scanner: true
    signal_collector: true
    persona_analyzer: true
    event_bus: true

sync:
  # 如需开启 daemon L1 扫描，请先把 daemon.services.l1_sync 设为 true
  l1_scan_poll_interval_seconds: 60
  l1_scan_max_sources_per_cycle: 3
  l1_scan_max_sessions_per_source: 20
  l1_scan_max_turns_per_session: 50
  l1_scan_max_file_bytes: 2097152
  l1_scan_recent_hours: 24

event_bus:
  # 真实环境保护：事件积压时只分批恢复到内存队列，剩余保持 pending
  queue_depth_alert: 1000
  max_queue_depth: 10000
  max_recover_events: 1000
